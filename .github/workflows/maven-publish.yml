
name: Java Maven CI Build & Push
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build_test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project-rebuild
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: hamzadb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven
      - name: Build with Maven
        run: mvn -B package --file pom.xml
      - name: Stage jar for upload
        run: mkdir staging && cp target/*.jar staging/
      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: Package
          path: project-rebuild/staging/

  publish-job:
      needs: build_test
      runs-on: ubuntu-latest
            
      steps:
        - name: Download built jar
          uses: actions/download-artifact@v4
          with:
            name: Package
            path: staging/
        - name: List downloaded artifacts
          run: ls -la staging/
